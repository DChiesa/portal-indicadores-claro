<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portal de Indicadores Claro</title><script src="./portal-config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><style>:root{--r:#e30613;--ink:#172033;--muted:#667085}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;color:var(--ink)}button,input{font:inherit}.hidden{display:none!important}#login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#a9000c,#ed0012);padding:18px}.loginCard{width:min(430px,100%);background:#fff;border-radius:24px;padding:30px;box-shadow:0 24px 60px #5a000655}.brand{display:flex;gap:13px;align-items:center}.logo{width:58px;height:58px;display:grid;place-items:center;border-radius:17px;background:var(--r);color:#fff;font-weight:900}.brand h1{margin:0;color:var(--r);font-size:25px}.brand p{margin:4px 0;color:var(--muted)}label{display:block;margin:13px 0 6px;font-size:13px;font-weight:750}input{width:100%;padding:14px;border:1px solid #cad2dc;border-radius:12px;background:#edf4ff}.enter{width:100%;margin-top:18px;padding:14px;border:0;border-radius:12px;background:var(--r);color:#fff;font-weight:900}.msg{min-height:20px;margin-top:10px;color:#b00020;font-size:12px}.owner{margin-top:15px;padding-top:14px;border-top:1px solid #e3e8ef;text-align:center;color:#777;font-size:12px}#portal{min-height:100vh;background:linear-gradient(#03091bc9,#03091bd9),url('./assets/fundo-portal.jpg') center/cover fixed}.top{display:flex;align-items:center;gap:14px;padding:16px 22px;background:linear-gradient(100deg,#a6000d,#e30613);color:#fff;box-shadow:0 5px 20px #0007}.top .logo{width:48px;height:48px;border:1px solid #ffffff66}.top h2{margin:0}.top p{margin:3px 0 0;opacity:.86}.spacer{flex:1}.logout,.back,.newtab{border:0;border-radius:11px;padding:10px 13px;font-weight:850;cursor:pointer}.logout{background:#fff;color:var(--r)}.content{max-width:1440px;margin:auto;padding:28px 22px 50px}.welcome{color:#fff;text-shadow:0 2px 9px #000b}.cards{display:grid;grid-template-columns:repeat(4,minmax(220px,1fr));gap:20px}.card{position:relative;display:flex;flex-direction:column;align-items:stretch;min-height:225px;padding:0;overflow:hidden;border:1px solid #ffffff88;border-radius:18px;background:#fff;text-align:left;box-shadow:0 12px 30px #0005;cursor:pointer;transition:.2s}.card:hover{transform:translateY(-5px);border-color:var(--r)}.thumb{height:126px;display:grid;place-items:center;border-bottom:3px solid var(--r);background:linear-gradient(135deg,#102847,#315d86);color:#fff;font-size:26px;font-weight:900}.cardInfo{display:flex;align-items:center;gap:12px;padding:14px 16px}.icon{width:42px;height:42px;display:grid;place-items:center;border-radius:11px;background:#eef4f9;font-size:22px}.card b,.card small{display:block}.card small{margin-top:5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:205px}.arrow{position:absolute;right:10px;top:10px;width:31px;height:31px;display:grid;place-items:center;border-radius:50%;background:#e30613;color:#fff;font-weight:900}.viewerHead{height:59px;display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid #ddd;background:#fff}.back{background:#e9edf2}.newtab{margin-left:auto;background:#1479d7;color:#fff}.frame{width:100%;height:calc(100vh - 59px);border:0}@media(max-width:1100px){.cards{grid-template-columns:repeat(3,1fr)}}@media(max-width:800px){.cards{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.cards{grid-template-columns:1fr}.top p{display:none}#portal{background-attachment:scroll}}</style></head><body><section id="login"><div class="loginCard"><div class="brand"><div class="logo">Claro</div><div><h1>Portal de Indicadores</h1><p>Acesso protegido pelo Supabase</p></div></div><form id="loginForm"><label>E-mail</label><input id="email" type="email" required autocomplete="username"><label>Senha</label><input id="password" type="password" required autocomplete="current-password"><button id="loginBtn" class="enter">Entrar</button><div id="msg" class="msg"></div></form><div class="owner">Propriedade e criação: Demétrius Chiesa</div></div></section><section id="portal" class="hidden"><header class="top"><div class="logo">Claro</div><div><h2>Portal de Indicadores</h2><p>Performance, qualidade e atualização automática</p></div><div class="spacer"></div><button id="logout" class="logout">Sair</button></header><main class="content"><h2 class="welcome">Selecione um painel</h2><div class="cards" id="cards"></div></main></section><section id="viewer" class="hidden"><div class="viewerHead"><button id="back" class="back">← Voltar ao portal</button><strong id="viewerTitle">Painel</strong><span id="viewerStatus">Abrindo...</span><button id="newtab" class="newtab">Abrir em nova aba</button></div><iframe id="frame" class="frame"></iframe></section><script>'use strict';const $=id=>document.getElementById(id),PANELS=[['AT1 / G1 Histórico','dashboard_at1_historico.html','atual/at1.xlsx','📈','AT1 / G1'],['Análise do QualiNET','analise_do_qualinet_atualizado.html','atual/qualinet.txt','🔎','QUALINET'],['TNPS Claro','dashboard_tnps_claro.html','atual/tnps.xlsx','⭐','TNPS'],['Log Manutenção','dashboard_log_manutencao.html','atual/LOG_MANUTENCAO.xlsx','🧰','LOG ≥ 3'],['NR35 Visão Técnico','painel_nr35_visao_tecnico.html','atual/nr35.xlsx','🛠️','NR35'],['Certidão de Atendimento','painel_certidao_atendimento.html','atual/certidao_atendimento.xlsx','📄','CERTIDÃO'],['Quebra Total','painel_quebra_total.html','atual/quebra_total.xlsx','📊','QUEBRA'],['Recomendações','painel_recomendacoes.html','atual/recomendacoes.xlsx','💡','RECOMENDAÇÕES'],['FLAG 24H','relatorio_flag_24h_graf_diario.html','atual/flag_24h.xlsx','🚩','FLAG 24H'],['Técnico Certificado','tecnico_certificado.html','atual/tecnico_certificado_atual.xlsx','🏅','CERTIFICADO'],['Manifestos RRS','relatorio_manifestos_rrs.html','atual/MANIF RRS.xlsx','📋','MANIFESTOS']];let sb,page='';function show(x){['login','portal','viewer'].forEach(id=>$(id).classList.toggle('hidden',id!==x))}function client(){if(!sb)sb=supabase.createClient(PORTAL_CONFIG.SUPABASE_URL,PORTAL_CONFIG.SUPABASE_PUBLISHABLE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});return sb}function renderCards(){$('cards').innerHTML=PANELS.map(p=>`<button class="card" data-page="${p[1]}" data-title="${p[0]}"><span class="arrow">›</span><div class="thumb">${p[4]}</div><div class="cardInfo"><span class="icon">${p[3]}</span><span><b>${p[0]}</b><small>${p[2]}</small></span></div></button>`).join('');document.querySelectorAll('.card').forEach(c=>c.onclick=()=>{page=c.dataset.page;$('viewerTitle').textContent=c.dataset.title;$('viewerStatus').textContent='Abrindo...';$('frame').src=page;show('viewer')})}async function init(){renderCards();try{const{data}=await client().auth.getSession();show(data.session?'portal':'login')}catch(e){show('login');$('msg').textContent=e.message}}$('loginForm').onsubmit=async e=>{e.preventDefault();$('loginBtn').disabled=true;$('msg').textContent='Validando...';const{data,error}=await client().auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});$('loginBtn').disabled=false;if(error){$('msg').textContent=error.message;return}if(data.session)show('portal')};$('logout').onclick=async()=>{await client().auth.signOut();show('login')};$('frame').onload=()=>$('viewerStatus').textContent='Carregado';$('back').onclick=()=>{$('frame').src='about:blank';show('portal')};$('newtab').onclick=()=>page&&window.open(page,'_blank','noopener');init();</script></body></html>
