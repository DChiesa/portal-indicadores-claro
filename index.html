<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--r:#e30613;--rd:#94140c;--bg:#f4f6f8;--ink:#202124;--muted:#68707a}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Segoe UI,Arial,sans-serif;color:var(--ink)}button,input{font:inherit}#login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#a9000c,#ed0012);padding:18px}.login-card{width:min(430px,100%);background:#fff;border-radius:25px;padding:30px;box-shadow:0 24px 60px #5a000655}.brand{display:flex;align-items:center;gap:13px}.logo{display:grid;place-items:center;width:58px;height:58px;border-radius:18px;background:var(--r);color:#fff;font-weight:900}.brand h1{font-size:25px;color:var(--r);margin:0}.brand p{margin:5px 0;color:var(--muted)}form{margin-top:22px}label{display:block;margin:13px 0 6px;font-weight:700;font-size:13px}input{width:100%;padding:14px;border:1px solid #cad2dc;border-radius:12px;background:#edf4ff;outline:0}input:focus{border-color:var(--r);box-shadow:0 0 0 3px #e3061320}.enter,.logout,.back,.newtab{border:0;border-radius:12px;font-weight:800;cursor:pointer}.enter{width:100%;padding:14px;margin-top:18px;background:var(--r);color:#fff}.enter:disabled{opacity:.65;cursor:wait}.msg{min-height:22px;margin-top:10px;font-size:13px;color:#b0000c}.owner{border-top:1px solid #e4e7eb;margin-top:14px;padding-top:14px;text-align:center;color:#77808b;font-size:12px}#portal,#viewer{display:none}.top{background:linear-gradient(110deg,#9c0009,#e30613);color:#fff;padding:16px 22px;display:flex;align-items:center;gap:15px;box-shadow:0 3px 14px #67000655}.top .logo{width:46px;height:46px;border:1px solid #ffffff66}.top h2{margin:0}.top p{margin:3px 0 0;opacity:.85}.spacer{flex:1}.logout,.back,.newtab{padding:10px 13px}.logout{background:#fff;color:var(--r)}.content{max-width:1400px;margin:auto;padding:22px}.welcome{margin:0 0 18px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{border:1px solid #dce2e8;border-radius:15px;background:#fff;padding:18px;text-align:left;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:0 6px 18px #23364a0c;transition:.18s}.card:hover{transform:translateY(-2px);border-color:#e3061366;box-shadow:0 10px 25px #23364a18}.icon{font-size:26px;width:42px;height:42px;display:grid;place-items:center;border-radius:12px;background:#eef6ff}.card b,.card small{display:block}.card b{margin-bottom:5px}.card small{color:var(--muted);word-break:break-all}.viewer-head{height:59px;background:#fff;border-bottom:1px solid #dce2e8;display:flex;align-items:center;gap:12px;padding:9px 14px}.back{background:#e9edf2}.newtab{background:#1479d7;color:#fff}.viewer-head #viewerTitle{font-weight:800}.viewer-head #viewerStatus{color:var(--muted);font-size:13px}.frame{width:100%;height:calc(100vh - 59px);border:0;background:#fff}@media(max-width:600px){.login-card{padding:24px 20px}.top{padding:13px}.top p{display:none}.content{padding:14px}.cards{grid-template-columns:1fr}.viewer-head{flex-wrap:wrap;height:auto}.frame{height:calc(100vh - 104px)}.newtab{margin-left:auto}}
/* NOVO VISUAL DA PAGINA PRINCIPAL - autenticacao preservada */
#portal{min-height:100vh;background-image:linear-gradient(rgba(3,9,27,.72),rgba(3,9,27,.84)),url('./assets/fundo-portal.jpg');background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:fixed}
#portal .top{box-shadow:0 5px 20px #0007}#portal .content{max-width:1400px;padding:28px 22px 50px}#portal .welcome{color:#fff;text-shadow:0 2px 9px #000b;margin-bottom:20px}
#portal .cards{grid-template-columns:repeat(4,minmax(220px,1fr));gap:20px}
#portal .card{position:relative;display:flex;flex-direction:column;align-items:stretch;gap:0;padding:0;min-height:230px;overflow:hidden;border:1px solid #ffffff88;border-radius:18px;box-shadow:0 12px 30px #0005;transition:transform .22s,box-shadow .22s,border-color .22s}
#portal .card:hover{transform:translateY(-6px);border-color:var(--r);box-shadow:0 18px 40px #0007,0 0 0 2px #e3061340}
.thumb{width:100%;height:132px;flex:0 0 132px;background:#eaf0f6 center/cover no-repeat;border-bottom:3px solid var(--r)}
.thumb-at1{display:grid;place-items:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#081a38 0%,#123f72 52%,#e30613 150%)}.thumb-at1:before{content:'AT1 / G1';color:#fff;font-size:30px;font-weight:900;letter-spacing:.5px;text-shadow:0 3px 12px #0008}.thumb-at1:after{content:'↗';position:absolute;right:24px;bottom:10px;color:#fff8;font-size:52px;font-weight:900}
.card-info{display:flex;align-items:center;gap:12px;padding:14px 16px 16px;min-width:0}.card-info .icon{flex:0 0 42px}.card-info small{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px}.arrow{position:absolute;z-index:2;top:10px;right:10px;width:32px;height:32px;display:grid;place-items:center;border-radius:50%;background:#e30613ee;color:#fff;font-size:20px;font-weight:900;box-shadow:0 4px 12px #0005}
@media(max-width:1150px){#portal .cards{grid-template-columns:repeat(3,minmax(210px,1fr))}}@media(max-width:850px){#portal .cards{grid-template-columns:repeat(2,minmax(205px,1fr))}}@media(max-width:600px){#portal{background-attachment:scroll}#portal .cards{grid-template-columns:1fr;gap:15px}#portal .card{min-height:218px}.thumb{height:124px;flex-basis:124px}}

</style>

<body>
<section id="login"><div class="login-card"><div class="brand"><div class="logo">Claro</div><div><h1>Portal de Indicadores</h1><p>Acesso protegido pelo Supabase</p></div></div><form id="loginForm"><label for="email">E-mail</label><input id="email" type="email" autocomplete="username" required><label for="password">Senha</label><input id="password" type="password" autocomplete="current-password" required><button class="enter" id="loginButton" type="submit">Entrar</button><div class="msg" id="loginMsg" aria-live="polite"></div></form><div class="owner">Propriedade e criação: Demétrius Chiesa</div></div></section>
<section id="portal"><header class="top"><div class="logo">Claro</div><div><h2>Portal de Indicadores</h2><p>Performance, qualidade e atualização automática</p></div><div class="spacer"></div><button class="logout" id="logoutButton">Sair</button></header><main class="content"><h2 class="welcome">Selecione um painel</h2><div class="cards">
<button class="card" data-page="dashboard_at1_historico.html" data-title="AT1 / G1 Histórico"><span class="arrow">›</span><div class="thumb thumb-at1" aria-label="Miniatura padrão AT1 / G1"></div><div class="card-info"><span class="icon">📈</span><span><b>AT1 / G1 Histórico</b><small>atual/at1.xlsx</small></span></div></button>
<button class="card" data-page="analise_do_qualinet_atualizado.html" data-title="Análise do QualiNET"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/qualinet.jpg')"></div><div class="card-info"><span class="icon">🔎</span><span><b>Análise do QualiNET</b><small>atual/qualinet.txt</small></span></div></button>
<button class="card" data-page="dashboard_tnps_claro.html" data-title="TNPS Claro"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/tnps.jpg')"></div><div class="card-info"><span class="icon">⭐</span><span><b>TNPS Claro</b><small>atual/tnps.xlsx</small></span></div></button>
<button class="card" data-page="painel_nr35_visao_tecnico.html" data-title="NR35 Visão Técnico"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/nr35.jpg')"></div><div class="card-info"><span class="icon">🛠️</span><span><b>NR35 Visão Técnico</b><small>atual/nr35.xlsx</small></span></div></button>
<button class="card" data-page="painel_certidao_atendimento.html" data-title="Certidão de Atendimento"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/certidao.jpg')"></div><div class="card-info"><span class="icon">📄</span><span><b>Certidão de Atendimento</b><small>atual/certidao_atendimento.xlsx</small></span></div></button>
<button class="card" data-page="painel_quebra_total.html" data-title="Quebra Total"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/quebra-total.jpg')"></div><div class="card-info"><span class="icon">📊</span><span><b>Quebra Total</b><small>atual/quebra_total.xlsx</small></span></div></button>
<button class="card" data-page="painel_recomendacoes.html" data-title="Recomendações"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/recomendacoes.jpg')"></div><div class="card-info"><span class="icon">💡</span><span><b>Recomendações</b><small>atual/recomendacoes.xlsx</small></span></div></button>
<button class="card" data-page="relatorio_flag_24h_graf_diario.html" data-title="FLAG 24H"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/flag-24h.jpg')"></div><div class="card-info"><span class="icon">🚩</span><span><b>FLAG 24H</b><small>atual/flag_24h.xlsx</small></span></div></button>
<button class="card" data-page="tecnico_certificado.html" data-title="Técnico Certificado"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/tecnico-certificado.jpg')"></div><div class="card-info"><span class="icon">🏅</span><span><b>Técnico Certificado</b><small>atual/tecnico_certificado_atual.xlsx</small></span></div></button>
<button class="card" data-page="relatorio_manifestos_rrs.html" data-title="Manifestos RRS"><span class="arrow">›</span><div class="thumb" style="background-image:url('./assets/miniaturas/manifestos-rrs.jpg')"></div><div class="card-info"><span class="icon">📋</span><span><b>Manifestos RRS</b><small>atual/MANIF RRS.xlsx</small></span></div></button>
</div></main></section>
<section id="viewer"><div class="viewer-head"><button class="back" id="closeViewer">← Voltar ao portal</button><span id="viewerTitle">Painel</span><span id="viewerStatus">Abrindo...</span><button class="newtab" id="openTab">Abrir em nova aba</button></div><iframe class="frame" id="panelFrame" title="Painel de indicadores"></iframe></section>
<script>
const byId=id=>document.getElementById(id);let sb=null,currentPage='';
function show(name){['login','portal','viewer'].forEach(id=>byId(id).style.display=id===name?(id==='login'?'grid':'block'):'none')}
function message(text,error=false){byId('loginMsg').textContent=text;byId('loginMsg').style.color=error?'#b0000c':'#4d6278'}
function getClient(){if(sb)return sb;if(!window.supabase)throw new Error('Biblioteca Supabase não carregou.');if(!window.PORTAL_CONFIG?.SUPABASE_URL||!window.PORTAL_CONFIG?.SUPABASE_PUBLISHABLE_KEY)throw new Error('Configuração do Supabase não foi carregada.');sb=window.supabase.createClient(window.PORTAL_CONFIG.SUPABASE_URL,window.PORTAL_CONFIG.SUPABASE_PUBLISHABLE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});return sb}
function timeout(ms){return new Promise((_,reject)=>setTimeout(()=>reject(new Error('O Supabase não respondeu. Verifique a conexão e tente novamente.')),ms))}
async function checkInitialSession(){try{message('Verificando sessão...');const result=await Promise.race([getClient().auth.getSession(),timeout(12000)]);if(result.error)throw result.error;if(result.data.session){show('portal');message('')}else{show('login');message('')}}catch(err){show('login');message(err.message||'Falha ao verificar sessão.',true)}}
byId('loginForm').addEventListener('submit',async e=>{e.preventDefault();const btn=byId('loginButton');btn.disabled=true;btn.textContent='Validando...';message('Validando acesso...');try{const result=await Promise.race([getClient().auth.signInWithPassword({email:byId('email').value.trim(),password:byId('password').value}),timeout(15000)]);if(result.error)throw result.error;if(!result.data.session)throw new Error('O Supabase não retornou uma sessão válida.');message('Acesso autorizado.');show('portal')}catch(err){console.error(err);message(err.message==='Invalid login credentials'?'E-mail ou senha inválidos.':(err.message||'Não foi possível autenticar.'),true)}finally{btn.disabled=false;btn.textContent='Entrar'}});
byId('logoutButton').addEventListener('click',async()=>{try{await Promise.race([getClient().auth.signOut(),timeout(10000)])}catch(e){console.warn(e)}byId('password').value='';show('login');message('Sessão encerrada.')});
document.querySelectorAll('.card').forEach(card=>card.addEventListener('click',()=>{currentPage=card.dataset.page;byId('viewerTitle').textContent=card.dataset.title;byId('viewerStatus').textContent='Abrindo...';byId('panelFrame').src=currentPage;show('viewer')}));
byId('panelFrame').addEventListener('load',()=>byId('viewerStatus').textContent='Carregado');byId('closeViewer').addEventListener('click',()=>{byId('panelFrame').src='about:blank';show('portal')});byId('openTab').addEventListener('click',()=>currentPage&&window.open(currentPage,'_blank','noopener'));
window.addEventListener('error',e=>{if(byId('login').style.display!=='none')message('Erro ao carregar o portal: '+e.message,true)});checkInitialSession();
</script>
</body></html>
