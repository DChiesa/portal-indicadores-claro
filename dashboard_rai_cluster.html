<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RAI Cluster</title><script src="./portal-config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script><style>
:root{--r:#e30613;--ink:#172033;--line:#c7d0dc;--bg:#f2f4f7;--ok:#16803a;--bad:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial;color:var(--ink)}.app{max-width:1720px;margin:auto;background:#fff;min-height:100vh}.top{display:flex;gap:14px;align-items:center;padding:14px 20px;background:linear-gradient(105deg,#b0000c,#e30613);color:#fff}.logo{width:48px;height:48px;border-radius:14px;background:#fff;color:var(--r);display:grid;place-items:center;font-weight:900}.top h1{margin:0;font-size:22px}.top p{margin:4px 0;font-size:12px}.status{padding:8px 20px;background:#171717;color:#fff;font-size:12px}.main{padding:14px}.filters{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:8px;padding:12px;border:1px solid var(--line);border-left:8px solid var(--r);border-radius:10px;margin-bottom:12px}.field label{display:block;font-size:10px;font-weight:900;margin-bottom:5px}.field select{width:100%;height:38px;border:1px solid #98a2b3;border-radius:7px;background:#fff;padding:0 9px}.btn{height:38px;align-self:end;border:0;border-radius:7px;background:var(--r);color:#fff;font-weight:900;padding:0 14px;cursor:pointer}.grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}.panel{border:1px solid var(--line);border-left:8px solid var(--r);border-radius:10px;padding:12px;margin-bottom:12px}.panel h2{text-align:center;font-size:17px;margin:0 0 8px}.chartbox{height:390px}.chartbox canvas{width:100%!important;height:100%!important}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.kpi{background:#f2f4f7;border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center}.kpi b{font-size:10px;display:block}.kpi strong{font-size:20px;display:block;margin-top:5px}.good{color:var(--ok)}.bad{color:var(--bad)}.insights{font-size:13px;line-height:1.5}.tablewrap{overflow:auto}.data{width:100%;min-width:920px;border-collapse:collapse;font-size:11px}.data th{background:#dce8f2}.data th,.data td{border:1px solid #8692a3;padding:6px </style></head><body><div class="app"><header class="top"><div class="logo">Claro</div><div><h1>RAI CLUSTER · INDICADORES</h1><p>Histórico corporativo por área, cidade e indicador</p></div></header><div id="status" class="status">V1.2 · Conectando ao Supabase...</div><main class="main"><section class="filters"><div class="field"><label>ÁREA</label><select id="area"></select></div><div class="field"><label>CIDADE / CLUSTER</label><select id="city"></select></div><div class="field"><label>INDICADOR</label><select id="indicator"></select></div><div class="field"><label>ANO DA TABELA</label><select id="year"><option>2026</option><option>2025</option></select></div><button id="refresh" class="btn">ATUALIZAR BASE</button></section><div class="grid"><section class="panel"><h2 id="title">Indicador</h2><div class="chartbox"><canvas id="chart"></canvas></div><div id="rule" class="rule"></div></section><section class="panel"><div class="kpis"><div class="kpi"><b>ÚLTIMO RESULTADO</b><strong id="last">-</strong></div><div class="kpi"><b>META</b><strong id="meta">-</strong></div><div class="kpi"><b>DESVIO</b><strong id="gap">-</strong></div></div><h2 style="margin-top:14px">Insights corporativos</h2><div id="insights" class="insights"></div></section></div><section class="panel"><h2 id="tableTitle">Tabela consolidada</h2><div id="table" class="tablewrap"></div></section></main><footer class="foot"><span id="fileInfo">Base não carregada.</span><b>Propriedade e criação: Demétrius Chiesa</b></footer></div><script>
(function(){
'use strict';
const $=id=>document.getElementById(id),MONTHS=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'],MN=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'],CITIES=['CLUSTER','BAGÉ','PELOTAS','RIO GRANDE','SÃO LOURENÇO','CAMAQUÃ'];
let rows=[],support=[],chart=null,sb=null;
const norm=v=>String(v??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();
const num=v=>{if(v===null||v===undefined||v===''||norm(v)==='N/A')return null;const n=typeof v==='number'?v:Number(String(v).replace(',','.'));return Number.isFinite(n)?n:null};
const fmt=v=>v===null||v===undefined?'-':Number(v).toLocaleString('pt-BR',{maximumFractionDigits:2});
function stat(t,k=''){$('status').textContent=t;$('status').style.color=k==='err'?'#ff8b8b':k==='ok'?'#7df0ad':'#fff'}
function cfg(){return window.PORTAL_CONFIG||{SUPABASE_URL:'https://frxfoztyctrvsobbawmo.supabase.co',SUPABASE_PUBLISHABLE_KEY:'sb_publishable_or6yc7T71Hpyajn9ctn1FA_BjsB6LhL',BUCKET:'bases-tecnico'}}
function headerDate(v){if(v instanceof Date&&!isNaN(v))return{year:v.getFullYear(),month:v.getMonth()+1};if(typeof v==='number'&&v>30000&&XLSX?.SSF?.parse_date_code){const d=XLSX.SSF.parse_date_code(v);if(d)return{year:d.y,month:d.m}}const s=String(v).trim().toLowerCase(),m=s.match(/^(jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)[\/\-](25|2025|26|2026)$/);return m?{year:m[2].length===2?2000+Number(m[2]):Number(m[2]),month:MN.indexOf(m[1])+1}:null}
function parse(ws){const a=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true}),hi=a.findIndex(r=>r.some(v=>norm(v)==='AREA')&&r.some(v=>norm(v).includes('CIDADE'))&&r.some(v=>norm(v)==='INDICADOR'));if(hi<0)throw Error('Cabeçalho da aba analitico não localizado.');const h=a[hi],idx=names=>h.findIndex(x=>names.includes(norm(x))),ia=idx(['AREA']),ic=idx(['CIDADE/CLUSTER','CIDADE','CLUSTER']),ii=idx(['INDICADOR']),im=idx(['META']),months=[];h.forEach((v,i)=>{const d=headerDate(v);if(d&&[2025,2026].includes(d.year))months.push({i,...d})});if(months.length<12)throw Error('Colunas mensais não reconhecidas. Encontradas: '+months.length);return a.slice(hi+1).filter(r=>r[ii]&&r[ic]).map(r=>({area:norm(r[ia]),city:norm(r[ic]),indicator:String(r[ii]).trim(),meta:num(r[im]),values:Object.fromEntries(months.map(x=>[`${x.year}-${x.month}`,num(r[x.i])]))}))}
function direction(ind){const key=norm(ind);for(const r of support)for(let i=0;i<r.length;i++)if(norm(r[i])===key)for(let j=i+1;j<Math.min(r.length,i+4);j++){const v=num(r[j]);if(v===0||v===1)return v}return['AT1','G1','LOG','GEO 1000','QUEBRA','MANIFEST','VISITA NAO OCORREU','CUSTO','TECNICO APOIO'].some(x=>key.includes(x))?1:0}
function fill(id,vals,pref){const e=$(id),old=e.value;e.innerHTML=vals.map(v=>`<option>${v}</option>`).join('');e.value=vals.includes(pref)?pref:vals.includes(old)?old:vals[0]||''}
function row(city){return rows.find(r=>r.area===$('area').value&&r.city===norm(city)&&norm(r.indicator)===norm($('indicator').value))}
function latest(r,y){if(!r)return null;for(let m=12;m>=1;m--){const v=r.values[`${y}-${m}`];if(v!==null&&v!==undefined)return{m,v}}return null}
function isGood(v,meta,dir){return v===null||meta===null?null:dir===1?v<=meta:v>=meta}
function render(){const city=$('city').value,ind=$('indicator').value,y=+$('year').value,r=row(city),cr=row('CLUSTER'),meta=r?.meta??cr?.meta??null,dir=direction(ind),now=new Date(),cm=now.getFullYear()===y?now.getMonth()+1:0,d25=MONTHS.map((_,i)=>r?.values[`2025-${i+1}`]??null),d26=MONTHS.map((_,i)=>r?.values[`2026-${i+1}`]??null);if(chart)chart.destroy();Chart.register(ChartDataLabels);chart=new Chart($('chart'),{type:'bar',data:{labels:MONTHS,datasets:[{label:'2025',data:d25,backgroundColor:'#b8b8b8',borderColor:'#555',borderWidth:1},{label:'2026',data:d26,backgroundColor:'#2698c8'},{type:'line',label:'META',data:MONTHS.map(()=>meta),borderColor:'#ff6b00',backgroundColor:'#ff6b00',borderWidth:2,pointRadius:0}]},options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom'},datalabels:{anchor:'end',align:'top',font:{size:9,weight:'bold'},formatter:v=>v===null?'':fmt(v)}},scales:{y:{grace:'18%'},x:{ticks:{color:c=>c.index+1===now.getMonth()+1?'#b45309':'#172033',font:c=>({weight:c.index+1===now.getMonth()+1?'bold':'normal'})}}}}});$('title').textContent=`${ind} · ${city}`;$('rule').textContent=`Meta ${fmt(meta)} · ${dir===1?'bom para baixo da meta':'bom para cima da meta'}`;const l=latest(r,y),g=l&&meta!==null?l.v-meta:null;$('last').textContent=l?fmt(l.v):'-';$('meta').textContent=fmt(meta);$('gap').textContent=g===null?'-':`${g>=0?'+':''}${fmt(g)}`;$('gap').className=g===null?'':isGood(l.v,meta,dir)?'good':'bad';table(y,cm);insights(y,dir,meta)}
function table(y,cm){let h=`<table class="data"><thead><tr><th>${y}</th>${MONTHS.map((m,i)=>`<th class="${i+1===cm?'current':''}">${m}</th>`).join('')}</tr></thead><tbody>`;for(const c of CITIES){const r=row(c);h+=`<tr><td>${c}</td>${MONTHS.map((_,i)=>`<td class="${i+1===cm?'current':''}">${fmt(r?.values[`${y}-${i+1}`]??null)}</td>`).join('')}</tr>`}h+='</tbody></table>';$('table').innerHTML=h;$('tableTitle').textContent=`${$('indicator').value} · resultados fixos do CLUSTER e cidades · ${y}`}
function insights(y,dir,meta){const all=CITIES.map(c=>({c,l:latest(row(c),y)})).filter(x=>x.l),cl=all.find(x=>x.c==='CLUSTER'),cities=all.filter(x=>x.c!=='CLUSTER');if(!cl){$('insights').innerHTML='<p>Sem dados disponíveis para o filtro.</p>';return}const gap=cl.l.v-meta,ordered=[...cities].sort((a,b)=>dir===1?a.l.v-b.l.v:b.l.v-a.l.v),best=ordered[0],worst=ordered.at(-1),off=cities.filter(x=>!isGood(x.l.v,meta,dir)),vals=MONTHS.map((_,i)=>row('CLUSTER')?.values[`${y}-${i+1}`]).filter(v=>v!==null&&v!==undefined),amp=vals.length?Math.max(...vals)-Math.min(...vals):null;$('insights').innerHTML=`<ul><li><b>CLUSTER:</b> ${fmt(cl.l.v)}, ${fmt(Math.abs(gap))} ${gap>=0?'acima':'abaixo'} da meta (${fmt(meta)}). <b class="${isGood(cl.l.v,meta,dir)?'good':'bad'}">${isGood(cl.l.v,meta,dir)?'Dentro':'Fora'} da meta</b>.</li>${best?`<li><b>Melhor cidade:</b> ${best.c}, ${fmt(best.l.v)}.</li>`:''}${worst?`<li><b>Ponto de atenção:</b> ${worst.c}, ${fmt(worst.l.v)}.</li>`:''}<li><b>Cidades fora da meta:</b> ${off.length?off.map(x=>x.c).join(', '):'nenhuma'}.</li>${amp!==null?`<li><b>Amplitude histórica do CLUSTER:</b> ${fmt(amp)}.</li>`:''}</ul>`}
function bind(){fill('area',[...new Set(rows.map(r=>r.area))].sort(),'MANUTENÇÃO');fill('city',CITIES,'CLUSTER');fill('indicator',[...new Set(rows.filter(r=>r.area===$('area').value).map(r=>r.indicator))].sort((a,b)=>a.localeCompare(b,'pt-BR')),'AT1');$('area').onchange=()=>{fill('indicator',[...new Set(rows.filter(r=>r.area===$('area').value).map(r=>r.indicator))].sort((a,b)=>a.localeCompare(b,'pt-BR')));render()};['city','indicator','year'].forEach(id=>$(id).onchange=render);$('refresh').onclick=load;render()}
async function load(){stat('V1.2 · Consultando atual/rai_cluster.xlsx...');try{const c=cfg();sb=sb||supabase.createClient(c.SUPABASE_URL,c.SUPABASE_PUBLISHABLE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});const r=await sb.storage.from(c.BUCKET||'bases-tecnico').download(c.FILES?.['dashboard_rai_cluster.html']||'atual/rai_cluster.xlsx');if(r.error)throw r.error;const wb=XLSX.read(await r.data.arrayBuffer(),{type:'array',cellDates:true}),an=wb.SheetNames.find(n=>norm(n)==='ANALITICO')||wb.SheetNames[0],ap=wb.SheetNames.find(n=>norm(n)==='APOIO');rows=parse(wb.Sheets[an]);support=ap?XLSX.utils.sheet_to_json(wb.Sheets[ap],{header:1,defval:'',raw:true}):[];$('fileInfo').textContent=`Supabase: ${(c.BUCKET||'bases-tecnico')}/atual/rai_cluster.xlsx · ${rows.length} séries` ;stat('V1.2 · Base carregada com dados de 2025 e 2026.','ok');bind()}catch(e){console.error(e);stat('Falha V1.2: '+(e.message||e),'err')}}load();
})();
</script></body></html>
