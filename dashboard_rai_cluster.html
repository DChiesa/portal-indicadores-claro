</style></head><body><div class="app"><header class="top"><div class="logo">Claro</div><div><h1>RAI CLUSTER · INDICADORES</h1><p>Histórico corporativo por área, cidade e indicador</p></div></header><div class="status" id="status">V1.1 · Conectando ao Supabase...</div><main class="main"><section class="filters"><div class="field"><label>ÁREA</label><select id="area"></select></div><div class="field"><label>CIDADE / CLUSTER</label><select id="city"></select></div><div class="field"><label>INDICADOR</label><select id="indicator"></select></div><div class="field"><label>ANO DA TABELA</label><select id="year"><option>2026</option><option>2025</option></select></div><button class="btn" id="refresh">ATUALIZAR BASE</button></section><div class="grid"><section class="panel"><h2 id="title">Indicador</h2><div class="chartbox"><canvas id="chart"></canvas></div><div class="metaRow" id="rule"></div></section><section class="panel"><div class="kpis"><div class="kpi"><b>ÚLTIMO RESULTADO</b><strong id="last">-</strong></div><div class="kpi"><b>META</b><strong id="meta">-</strong></div><div class="kpi"><b>DESVIO</b><strong id="gap">-</strong></div></div><h2>Insights corporativos</h2><div class="insights" id="insights"></div></section></div><section class="panel"><h2 id="tableTitle">Tabela consolidada</h2><div class="tablewrap" id="table"></div></section></main><footer class="foot"><span id="fileInfo">Base não carregada.</span><b>Propriedade e criação: Demétrius Chiesa</b></footer></div><script>
(function(){'use strict';const $=id=>document.getElementById(id),MONTHS=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'],CITIES=['CLUSTER','BAGÉ','PELOTAS','RIO GRANDE','SÃO LOURENÇO','CAMAQUÃ'];let rows=[],support=[],chart=null,sb=null,currentPath='';const norm=v=>String(v??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase(),num=v=>{if(v===null||v===undefined||v===''||norm(v)==='N/A')return null;if(typeof v==='number')return Number.isFinite(v)?v:null;let n=Number(String(v).replace(',','.'));return Number.isFinite(n)?n:null},fmt=v=>v===null||v===undefined?'-':Number(v).toLocaleString('pt-BR',{maximumFractionDigits:2});function stat(t,k=''){$('status').textContent=t;$('status').style.color=k==='err'?'#ff8b8b':k==='ok'?'#7df0ad':'#fff'}function config(){return window.PORTAL_CONFIG||{SUPABASE_URL:'https://frxfoztyctrvsobbawmo.supabase.co',SUPABASE_PUBLISHABLE_KEY:'sb_publishable_or6yc7T71Hpyajn9ctn1FA_BjsB6LhL',BUCKET:'bases-tecnico'}}function headerIndex(h,names){return h.findIndex(x=>names.includes(norm(x)))}function parseSheet(ws){const a=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});let hi=a.findIndex(r=>r.some(v=>norm(v)==='AREA')&&r.some(v=>norm(v).includes('CIDADE'))&&r.some(v=>norm(v)==='INDICADOR'));if(hi<0)throw new Error('Cabeçalho da aba analitico não localizado.');const h=a[hi],ia=headerIndex(h,['AREA']),ic=headerIndex(h,['CIDADE/CLUSTER','CIDADE','CLUSTER']),ii=headerIndex(h,['INDICADOR']),im=headerIndex(h,['META']);const months=[];h.forEach((v,i)=>{let s=String(v).trim().toLowerCase(),m=s.match(/^(jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)[\/\-](25|2025|26|2026)$/);if(m)months.push({i,month:['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'].indexOf(m[1])+1,year:m[2].length===2?2000+Number(m[2]):Number(m[2])})});if(!months.length)throw new Error('Colunas mensais 2025/2026 não localizadas.');return a.slice(hi+1).filter(r=>r[ii]&&r[ic]).map(r=>({area:norm(r[ia]),city:nor ].sort((a,b)=>dir===1?a.l.v-b.l.v:b.l.v-a.l.v),best=ordered[0],worst=ordered.at(-1),off=cities.filter(x=>!good(x.l.v,meta,dir));let hist=rowFor('CLUSTER'),vals=MONTHS.map((_,i)=>hist?.values[`${year}-${i+1}`]).filter(v=>v!==null&&v!==undefined),range=vals.length?Math.max(...vals)-Math.min(...vals):null;$('insights').innerHTML=`<ul><li><b>CLUSTER:</b> ${fmt(cluster.l.v)} no último mês disponível de ${year}, ${Math.abs(gap).toLocaleString('pt-BR',{maximumFractionDigits:2})} ${gap>=0?'acima':'abaixo'} da meta (${fmt(meta)}). Situação: <b class="${ok?'good':'bad'}">${ok?'dentro':'fora'} da meta</b>.</li>${best?`<li><b>Melhor resultado entre as cidades:</b> ${best.c}, com ${fmt(best.l.v)}.</li>`:''}${worst?`<li><b>Ponto de atenção:</b> ${worst.c}, com ${fmt(worst.l.v)}${good(worst.l.v,meta,dir)?'':' e fora da meta'}.</li>`:''}<li><b>Cidades fora da meta:</b> ${off.length?off.map(x=>x.c).join(', '):'nenhuma no último mês disponível'}.</li>${range!==null?`<li><b>Amplitude histórica do CLUSTER em ${year}:</b> ${fmt(range)} entre o menor e o maior resultado mensal. ${meta!==0&&range>Math.abs(meta)*.3?'A variação histórica está elevada e merece acompanhamento.':'A série não apresenta amplitude proporcional elevada pelo critério do painel.'}</li>`:''}</ul>`}function bind(){fill('area',areas(),'MANUTENÇÃO');fill('city',CITIES,'CLUSTER');fill('indicator',indicators($('area').value),'TNPS VISITA NÃO OCORREU');$('area').onchange=()=>{fill('indicator',indicators($('area').value));render()};['city','indicator','year'].forEach(id=>$(id).onchange=render);$('refresh').onclick=load;render()}async function download(path){const b=config().BUCKET||'bases-tecnico',r=await sb.storage.from(b).download(path);if(r.error)throw r.error;return r.data.arrayBuffer()}async function load(){stat('Consultando a planilha RAI no Supabase...');try{const c=config();sb=sb||supabase.createClient(c.SUPABASE_URL,c.SUPABASE_PUBLISHABLE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false
